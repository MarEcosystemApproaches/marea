# See pacea for other examples, not copying them to here.
# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, dev-jct, dev-andy, dev-emily, dev-remi]
  pull_request:
    branches: [main, dev-jct, dev-andy, dev-emily, dev-remi]

name: test-coverage

jobs:
  test-coverage:
    runs-on: windows-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      RETICULATE_PYTHON: python

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure Python for R
        run: |
          python -m pip install --upgrade pip
          python -m pip install copernicusmarine
        shell: bash

      - name: Set RETICULATE_PYTHON to full path
        run: echo "RETICULATE_PYTHON=$(which python)" >> $GITHUB_ENV
        shell: bash

      - name: Debug Python detection
        run: |
          cat("RETICULATE_PYTHON:", Sys.getenv("RETICULATE_PYTHON"), "\n")
          cat("which python:", Sys.which("python"), "\n")
          cat("py_available(initialize=TRUE):", reticulate::py_available(initialize = TRUE), "\n")
        shell: Rscript {0}
        
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::reticulate
          needs: coverage

      - name: Test coverage
        run: |
          token <- Sys.getenv("CODECOV_TOKEN", "")
          covr::codecov(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package"),
            token = if (token != "") token
          )
        shell: Rscript {0}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
